<style>
  :root {
    --bg: #F2F4F6;
    --surface: #FFFFFF;
    --ink: #191F28;
    --ink-soft: #4E5968;
    --ink-faint: #8B95A1;
    --line: #E5E8EB;
    --line-soft: #F1F3F5;
    --blue: #3182F6;
    --blue-deep: #1B64DA;
    --blue-ink: #12376E;
    --tint: #EDF4FF;
    --tint-deep: #DBEAFF;
    --good: #17A366;
    --warn: #F09000;
    --crit: #F04452;
    --font: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font); line-height: 1.6; letter-spacing: -0.02em;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all; overflow-wrap: break-word;
    display: flex; justify-content: center; align-items: center;
  }

  /* phone shell */
  .app {
    position: relative;
    width: 100%; max-width: 460px; height: 100dvh; max-height: 920px;
    background: var(--surface); overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 70px rgba(19,55,110,.16);
  }
  @media (min-width: 480px) { .app { border-radius: 32px; height: 92dvh; } }

  /* top bar */
  .topbar {
    height: 56px; flex: 0 0 56px; display: flex; align-items: center;
    padding: 0 8px; gap: 4px; position: relative; z-index: 5;
  }
  .iconbtn {
    width: 44px; height: 44px; border: 0; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center; border-radius: 12px;
    color: var(--ink); opacity: 0; pointer-events: none; transition: opacity .2s, background .15s;
  }
  .iconbtn.show { opacity: 1; pointer-events: auto; }
  .iconbtn:active { background: var(--line-soft); }
  .prog {
    flex: 1; display: flex; gap: 4px; padding: 0 10px;
    opacity: 0; transition: opacity .25s;
  }
  .prog.show { opacity: 1; }
  .prog i { flex: 1; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .prog i b { display: block; height: 100%; width: 0; background: var(--blue); border-radius: 3px; transition: width .35s cubic-bezier(.2,.7,.3,1); }
  .prog i.done b { width: 100%; }
  .prog-spacer { width: 44px; flex: 0 0 44px; }

  /* screen stage */
  .stage { flex: 1; position: relative; overflow: hidden; }
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    padding: 8px 24px 24px; overflow-y: auto;
    opacity: 0; visibility: hidden; transform: translateX(24px);
    transition: opacity .32s cubic-bezier(.2,.7,.3,1), transform .32s cubic-bezier(.2,.7,.3,1), visibility .32s;
  }
  .screen.active { opacity: 1; visibility: visible; transform: none; }
  .screen.exit-left { transform: translateX(-24px); }

  .grow { flex: 1; }
  .spacer-sm { height: 10px; }

  /* typography */
  .kicker { font-size: 13.5px; font-weight: 700; color: var(--blue); margin-bottom: 12px; }
  h1.title { font-size: 26px; font-weight: 800; letter-spacing: -0.045em; line-height: 1.3; margin: 0; text-wrap: balance; }
  h1.title em { font-style: normal; color: var(--blue); }
  .lede { font-size: 15.5px; color: var(--ink-soft); margin-top: 16px; font-weight: 500; }
  .q-area { font-size: 13.5px; font-weight: 700; color: var(--blue); margin-bottom: 10px; }
  .q-text { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.35; margin: 0; text-wrap: balance; }
  .q-hint { font-size: 14px; color: var(--ink-faint); margin-top: 12px; font-weight: 500; }

  /* option buttons */
  .opts { display: flex; flex-direction: column; gap: 10px; padding-bottom: 8px; }
  .opt {
    width: 100%; text-align: left; cursor: pointer;
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 16px;
    padding: 17px 18px; font-family: inherit; font-size: 16px; font-weight: 600; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .opt .lead { display: flex; flex-direction: column; }
  .opt .lead small { font-size: 12.5px; font-weight: 500; color: var(--ink-faint); margin-top: 1px; }
  .opt:active { transform: scale(.985); }
  .opt .tick { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line); flex: 0 0 auto; display:flex; align-items:center; justify-content:center; }
  .opt.sel { border-color: var(--blue); background: var(--tint); color: var(--blue-deep); }
  .opt.sel .lead small { color: var(--blue); }
  .opt.sel .tick { border-color: var(--blue); background: var(--blue); }
  .opt.sel .tick::after { content: ""; width: 10px; height: 10px; }
  .opt.sel .tick svg { display: block; }
  .opt .tick svg { display: none; }

  /* primary button */
  .cta {
    width: 100%; border: 0; cursor: pointer; font-family: inherit;
    background: var(--blue); color: #fff; border-radius: 16px;
    padding: 17px; font-size: 16.5px; font-weight: 700; letter-spacing: -0.02em;
    transition: background .15s, transform .1s;
  }
  .cta:active { transform: scale(.99); background: var(--blue-deep); }
  .cta.ghost { background: var(--tint); color: var(--blue-deep); }
  .cta.ghost:active { background: var(--tint-deep); }
  .cta:disabled { background: var(--line); color: var(--ink-faint); cursor: default; }
  .cta-row { display: flex; gap: 10px; }
  .cta-row .cta { flex: 1; }
  .footer-cta { padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* loading */
  .load-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; }
  .spinner { width: 52px; height: 52px; border-radius: 50%; border: 5px solid var(--tint-deep); border-top-color: var(--blue); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-wrap p { font-size: 16px; color: var(--ink-soft); font-weight: 600; text-align: center; }

  /* result */
  .result-top { text-align: center; padding: 14px 0 8px; }
  .badge { display: inline-block; font-size: 14px; font-weight: 700; color: var(--blue-deep); background: var(--tint); padding: 7px 16px; border-radius: 999px; }
  .score { font-size: 76px; font-weight: 800; letter-spacing: -0.05em; line-height: 1.05; color: var(--blue); font-variant-numeric: tabular-nums; margin-top: 12px; }
  .score span { font-size: 26px; color: var(--ink-faint); font-weight: 700; }
  .result-desc { font-size: 15.5px; color: var(--ink-soft); font-weight: 500; margin-top: 8px; text-wrap: balance; }

  .axis-scores { display: flex; gap: 12px; margin-top: 24px; }
  .axis-card { flex: 1; background: var(--line-soft); border-radius: 16px; padding: 16px 18px; }
  .axis-card .an { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .axis-card .av { font-size: 22px; font-weight: 800; color: var(--ink); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .axis-card .av small { font-size: 13px; color: var(--ink-faint); font-weight: 600; }

  /* area bars */
  .bars { margin-top: 22px; display: flex; flex-direction: column; gap: 12px; }
  .bar-row { display: grid; grid-template-columns: 92px 1fr 30px; align-items: center; gap: 12px; }
  .bar-row .bn { font-size: 13.5px; font-weight: 600; color: var(--ink-soft); }
  .bar-track { height: 8px; background: var(--line); border-radius: 5px; overflow: hidden; }
  .bar-track b { display: block; height: 100%; background: var(--blue); border-radius: 5px; width: 0; transition: width .6s cubic-bezier(.2,.7,.3,1); }
  .bar-row.low .bn { color: var(--blue-deep); font-weight: 700; }
  .bar-row.low .bar-track b { background: var(--blue-deep); }
  .bar-row .bv { font-size: 13px; font-weight: 700; color: var(--ink-faint); text-align: right; font-variant-numeric: tabular-nums; }

  /* weak cards */
  .weak-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .weak-card { background: var(--tint); border: 1.5px solid var(--tint-deep); border-radius: 18px; padding: 20px; }
  .weak-card .wl { font-size: 12.5px; font-weight: 700; color: var(--blue); }
  .weak-card .wn { font-size: 19px; font-weight: 800; color: var(--ink); margin-top: 4px; }
  .weak-card .ww { font-size: 14px; color: var(--ink-soft); margin-top: 8px; font-weight: 500; line-height: 1.55; }

  /* goal editor */
  .goal-block { background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px; padding: 18px; margin-top: 14px; }
  .goal-block .gt { font-size: 13.5px; font-weight: 700; color: var(--blue); margin-bottom: 12px; }
  .goal-form { display: flex; flex-direction: column; gap: 8px; }
  .goal-line { font-size: 15px; color: var(--ink-soft); line-height: 1.7; }
  .goal-line textarea {
    width: 100%; margin-top: 4px; resize: none; overflow: hidden;
    font-family: inherit; font-size: 15px; font-weight: 600; color: var(--ink);
    background: var(--tint); border: 1.5px solid transparent; border-radius: 11px;
    padding: 10px 13px; line-height: 1.5; transition: border-color .15s;
  }
  .goal-line textarea:focus { outline: none; border-color: var(--blue); background: #fff; }
  .goal-line .pre { font-weight: 700; color: var(--ink); }

  /* 30 day */
  .week-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .week-row { display: flex; gap: 14px; align-items: center; background: var(--line-soft); border-radius: 14px; padding: 15px 16px; }
  .week-row .wt { font-size: 12.5px; font-weight: 800; color: #fff; background: var(--blue); border-radius: 8px; padding: 5px 10px; flex: 0 0 auto; }
  .week-row .wx { font-size: 15px; color: var(--ink); font-weight: 600; line-height: 1.45; }
  .goal-recap { background: var(--blue-ink); color: #fff; border-radius: 18px; padding: 20px; margin-top: 4px; }
  .goal-recap h4 { margin: 0 0 12px; font-size: 13px; font-weight: 700; color: #A9C6F5; letter-spacing: 0; }
  .goal-recap p { font-size: 15px; font-weight: 600; line-height: 1.55; margin: 0; }
  .goal-recap p + p { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.14); }

  .note { font-size: 13px; color: var(--ink-faint); text-align: center; line-height: 1.6; margin-top: 4px; }

  /* dots deco on intro */
  .intro-visual { display: flex; flex-direction: column; gap: 14px; margin: 8px 0 4px; }
  .iv-row { display: flex; align-items: center; gap: 12px; }
  .iv-row .dot { width: 34px; height: 34px; border-radius: 11px; background: var(--tint); color: var(--blue-deep); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex: 0 0 auto; }
  .iv-row .txt { font-size: 15px; font-weight: 600; color: var(--ink-soft); }

  /* ROI character face */
  .roi-face { width: 104px; height: auto; display: block; margin: 0 0 20px; filter: drop-shadow(0 6px 12px rgba(19,55,110,.12)); }
  .roi-face.center { margin-left: auto; margin-right: auto; }
  .roi-mini { width: 64px; height: auto; display: block; margin: 0 auto 4px; }

  /* kakao / share buttons */
  .cta.kakao { background: #FEE500; color: #3B1F1E; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .cta.kakao:active { background: #F2D900; }
  .cta.kakao svg { flex: 0 0 auto; }
  .share-row { display: flex; gap: 10px; }
  .share-row .cta { flex: 1; }
  .share-cap { font-size: 13px; color: var(--ink-faint); font-weight: 600; text-align: center; margin: 4px 0 -2px; }

  /* 인앱 브라우저 안내 */
  .notice { display: flex; gap: 9px; align-items: flex-start; background: var(--tint); border: 1px solid var(--tint-deep); border-radius: 12px; padding: 11px 13px; margin-bottom: 4px; }
  .notice .ic { flex: 0 0 auto; margin-top: 1px; }
  .notice .tx { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; line-height: 1.55; }
  .notice .tx b { color: var(--blue-deep); }
  .notice-link { display: inline; color: var(--blue-deep); font-weight: 800; text-decoration: underline; cursor: pointer; }

  /* saveable result card (30일 화면) */
  .capture { background: #fff; padding: 6px 2px 14px; }
  .plan-head { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 4px; }
  .plan-score { font-size: 40px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; font-variant-numeric: tabular-nums; }
  .plan-score span { font-size: 17px; color: var(--ink-faint); font-weight: 700; }
  .cap-title { font-size: 21px; font-weight: 800; letter-spacing: -0.04em; text-align: center; margin: 16px 0 14px; }
  .cap-sub { font-size: 13.5px; font-weight: 700; color: var(--blue); margin: 20px 0 10px; }

  /* toast */
  .toast {
    position: absolute; left: 50%; bottom: 30px; transform: translate(-50%, 20px);
    background: var(--ink); color: #fff; font-size: 14px; font-weight: 600;
    padding: 12px 20px; border-radius: 12px; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 50; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  @media (prefers-reduced-motion: reduce) {
    .screen, .prog i b, .bar-track b, .iconbtn, .prog, .toast { transition: none; }
    .spinner { animation-duration: 1.6s; }
  }

  /* print / PDF */
  @media print {
    body { display: block; background: #fff; }
    .app { max-width: 100%; height: auto; max-height: none; box-shadow: none; }
    .topbar, .screen:not(.active) { display: none; }
    .no-print { display: none !important; }
    .screen.active { position: static; opacity: 1; visibility: visible; transform: none; overflow: visible; }
  }
</style>
</head>

  function computeResult() {
    var raw = answers.reduce(function (a, b){ return a + (b || 0); }, 0); // 0..20
    var total = raw * 5; // 0..100
    var band = BANDS[BANDS.length - 1];
    for (var i = 0; i < BANDS.length; i++) {
      if (total >= BANDS[i].min && total <= BANDS[i].max) { band = BANDS[i]; break; }
    }
    // axis scores (each axis 5 q, max 10 -> %*)
    var a1 = 0, a2 = 0;
    for (var j = 0; j < 5; j++) a1 += (answers[j] || 0);
    for (var k = 5; k < 10; k++) a2 += (answers[k] || 0);
    // areas with score, find 2 lowest (tie -> earlier order)
    var areas = QUESTIONS.map(function (q, idx) { return { area: q.area, v: (answers[idx] || 0), idx: idx }; });
    var sorted = areas.slice().sort(function (x, y) { return x.v - y.v || x.idx - y.idx; });
    var weak = sorted.slice(0, 2);
    return { total: total, band: band, a1: a1, a2: a2, areas: areas, weak: weak };
  }

  var KAKAO_KEY = "08cb07bc9206858ef6de0a3a6beadbae";
  var SHARE_TITLE = "나는 일을 처리할까, 관리할까?";
  var SHARE_TEXT = "2분 PM 자기진단 · 내 유형 확인부터 30일 성장 계획까지 · 더로이그룹";

  function shareUrl() {
    var u = window.location.href;
    return (u && u.indexOf("http") === 0) ? u : "";
  }

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(t._tm);
    t._tm = setTimeout(function () { t.classList.remove("show"); }, 2400);
  }

  var kakaoState = 0; // 0 미시도, 1 준비됨, -1 불가
  function loadKakao(cb) {
    var url = shareUrl();
    if (!KAKAO_KEY || !url) { cb(false); return; }              // 키 없거나 미배포 → 폴백
    if (window.Kakao && window.Kakao.Share) { ensureInit(); cb(kakaoState === 1); return; }
    var s = document.createElement("script");
    s.src = "https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js";
    s.crossOrigin = "anonymous";
    s.onload = function () { ensureInit(); cb(kakaoState === 1); };
    s.onerror = function () { kakaoState = -1; cb(false); };      // CSP/오프라인 → 폴백
    document.head.appendChild(s);
  }
  function ensureInit() {
    try {
      if (window.Kakao && !window.Kakao.isInitialized()) window.Kakao.init(KAKAO_KEY);
      kakaoState = 1;
    } catch (e) { kakaoState = -1; }
  }

  function shareApp() {
    var url = shareUrl();
    // 1) 카카오 카드 공유 (키+배포 시)
    loadKakao(function (ok) {
      if (ok) {
        try {
          window.Kakao.Share.sendDefault({
            objectType: "feed",
            content: {
              title: SHARE_TITLE,
              description: SHARE_TEXT,
              imageUrl: "https://roiassociate-web.github.io/pm-check/og-v5.png",
              link: { mobileWebUrl: url, webUrl: url }
            },
            buttons: [{ title: "진단하러 가기", link: { mobileWebUrl: url, webUrl: url } }]
          });
          return;
        } catch (e) { /* 아래로 폴백 */ }
      }
      // 2) 모바일 네이티브 공유 시트 (카카오톡 포함)
      if (navigator.share) {
        var payload = { title: SHARE_TITLE, text: SHARE_TEXT };
        if (url) payload.url = url;
        navigator.share(payload).then(function () {}, function (err) {
          if (err && err.name === "AbortError") return;           // 사용자가 취소
          copyShare(url);                                          // 막히면 복사로 폴백
        });
        return;
      }
      // 3) 데스크톱 등 → 링크+문구 복사
      copyShare(url);
    });
  }

  function copyShare(url) {
    var text = (url ? url + "\n" : "") + SHARE_TEXT;
    copyText(text, url ? "링크를 복사했어요. 카카오톡에 붙여넣어 공유하세요"
                       : "소개 문구를 복사했어요. 카카오톡에 붙여넣어 공유하세요");
  }

  function copyLink() {
    var url = shareUrl();
    if (!url) { copyText(SHARE_TEXT, "소개 문구를 복사했어요 (웹에 올리면 링크가 함께 복사돼요)"); return; }
    copyText(url, "링크가 복사되었어요");

  function copyText(text, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { toast(okMsg); }, function () { fallbackCopy(text, okMsg); });
    } else { fallbackCopy(text, okMsg); }
  }

  function fallbackCopy(text, okMsg) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      toast(okMsg);
    } catch (e) { toast("복사에 실패했어요"); }
  }

  // ---------- save as image (모바일 포함) ----------
  function withHtml2canvas(cb) {
    if (window.html2canvas) { cb(window.html2canvas); return; }
    var s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = function () { cb(window.html2canvas || null); };
    s.onerror = function () { cb(null); };
    document.head.appendChild(s);
  }

  function preloadH2C() { withHtml2canvas(function () {}); } // 저장 지연 줄이려 미리 로드

  // 인앱(웹뷰) 브라우저 감지 — 이 안에서는 저장/다운로드가 막히는 경우가 많음
  function inAppInfo() {
    var ua = navigator.userAgent || "";
    if (/KAKAOTALK/i.test(ua)) return { name: "카카오톡", kakao: true };
    if (/instagram/i.test(ua)) return { name: "인스타그램" };
    if (/FBAN|FBAV|FB_IAB/i.test(ua)) return { name: "페이스북" };
    if (/Line\//i.test(ua)) return { name: "라인" };
    if (/NAVER\(inapp/i.test(ua)) return { name: "네이버 앱" };
    if (/DaumApps/i.test(ua)) return { name: "다음 앱" };
    return null;
  }

  var planBlob = null; // 저장 버튼 누르기 전에 미리 만들어 둔 결과 이미지

  function renderCapture(node, cb) {
    if (!node) { cb(null, "no-node"); return; }
    withHtml2canvas(function (h2c) {
      if (!h2c) { cb(null, "no-lib"); return; }
      try {
        h2c(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true, logging: false })
          .then(function (canvas) {
            if (canvas.toBlob) canvas.toBlob(function (b) { cb(b, b ? null : "blob"); }, "image/png");
            else cb(dataURLtoBlob(canvas.toDataURL("image/png")), null);
          })
          .catch(function () { cb(null, "render"); });
      } catch (e) { cb(null, "render"); }
    });
  }

  // 결과 화면 도달 시 미리 이미지를 만들어 둔다 → 탭하는 순간 제스처가 살아 있어 공유 시트가 뜬다
  function prerenderPlan(node) {
    planBlob = null;
    renderCapture(node, function (blob) { if (blob) planBlob = blob; });
  }

  function saveImage(node) {
    if (planBlob) { deliverImage(planBlob); return; }   // 이미 준비됨 → 즉시 공유(제스처 유지)
    toast("이미지를 만드는 중…");
    renderCapture(node, function (blob, err) {
      if (blob) { deliverImage(blob); return; }
      toast(err === "no-lib" ? "저장 기능을 불러오지 못했어요. 화면을 스크린샷 해주세요"
                             : "저장에 실패했어요. 화면을 스크린샷 해주세요");
    });
  }

  function deliverImage(blob) {
    if (!blob) { toast("이미지 생성에 실패했어요"); return; }
    var file = null;
    try { file = new File([blob], "PM자기진단_결과.png", { type: "image/png" }); } catch (e) {}
    // 폰(터치 우선)은 공유 시트, PC는 곧바로 다운로드
    var wantShare = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    // 1) 모바일: 공유 시트 → [사진(이미지) 저장] 또는 카카오톡 전송
    if (wantShare && file && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: "PM 자기진단 결과", text: "나의 PM 성장 플랜" })
        .then(function () {})
        .catch(function (err) { if (err && err.name === "AbortError") return; fallbackSave(blob); });
      return;
    }
    // 2) 데스크톱/미지원 → 다운로드, 그래도 안 되면 새 탭에 이미지
    fallbackSave(blob);
  }

  function fallbackSave(blob) {
    var url = URL.createObjectURL(blob);
    try {
      var a = document.createElement("a");
      a.href = url; a.download = "PM자기진단_결과.png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      toast("이미지를 저장했어요");
      setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
    } catch (e) {
      window.open(url, "_blank"); // 최후: 이미지 열기 → 길게 눌러 저장
      toast("이미지를 길게 눌러 저장하세요");
    }
  }

  function dataURLtoBlob(dataurl) {
    var arr = dataurl.split(","), mime = arr[0].match(/:(.*?);/)[1];
    var bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
    while (n--) u8[n] = bstr.charCodeAt(n);
    return new Blob([u8], { type: mime });
  }

  // ---------- utils ----------
  function hexTint(hex) {
    var c = { "#F23645":"#FDEBEC", "#FB8C00":"#FFF2E1", "#3182F6":"#EDF4FF", "#17A366":"#E6F6EE" };
    return c[hex] || "#EDF4FF";
  }

  // ---------- start ----------
  screenIntro();
})();
</script>
